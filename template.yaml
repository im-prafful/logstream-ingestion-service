AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Log Ingestion Pipeline using SAM, SQS, and Postgres (Scheduled Polling Model).

Parameters:
  # --- DB Parameters (Non-interactive) ---
  PostgresHost:
    Type: String
    Default: "logstream-2-db.czegikcsabng.ap-south-1.rds.amazonaws.com"
  PostgresDatabase:
    Type: String
    Default: "LogStream_2.0"
  PostgresUser:
    Type: String
    Default: "masterUser"
  PostgresPassword:
    Type: String
    # Removed NoEcho: true to prevent interactive prompt, allowing default to be used.
    Default: "Admin$1234" 
  PostgresPort:
    Type: Number
    Default: 5432
  
  # --- SQS Parameters (Existing Queue) ---
  ExistingQueueUrl:
    Type: String
    Description: The URL of the SQS queue created manually in the console.
    Default: "https://sqs.ap-south-1.amazonaws.com/031415497613/SQS_LogIngestion"
    
  ExistingQueueArn:
    Type: String
    Description: The ARN of the SQS queue for IAM permissions.
    Default: "arn:aws:sqs:ap-south-1:031415497613:SQS_LogIngestion" 

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 512
    Timeout: 60 # Maximum cycle time for polling/insertion

Resources:
  # --- 1. Log Producer Function (Sends to SQS) ---
  LogProducerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: LogProducer/
      Handler: app.handler
      Policies:
        # Permission to send messages to SQS (using the ARN parameter)
        - Statement:
            Effect: Allow
            Action: 'sqs:SendMessage'
            Resource: !Ref ExistingQueueArn 
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref ExistingQueueUrl 

  # --- 2. Log Pipeline/Consumer Function (Polls SQS & Inserts to DB) ---
  LogPipelineFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: LogPipeline/
      Handler: app.handler
      
          
      # Policies: Permissions required for SQS polling/deletion and DB access
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - 'sqs:ReceiveMessage'
              - 'sqs:DeleteMessageBatch'
              - 'sqs:DeleteMessage'
              - 'sqs:GetQueueAttributes'
            Resource: !Ref ExistingQueueArn
        - Statement:
            Effect: Allow
            Action:
              - 'rds:Connect'
            Resource: '*'

      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref ExistingQueueUrl
          DB_HOST: !Ref PostgresHost
          DB_PORT: !Ref PostgresPort
          DB_NAME: !Ref PostgresDatabase
          DB_USER: !Ref PostgresUser
          DB_PASSWORD: !Ref PostgresPassword

  # --- 3. ML Batch Processor (Creates Batches & Invokes Bridge) ---
  MLBatchProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ML_Batch_Processor/
      Handler: app.handler  # Matches your export const createLogBatch in app.mjs
      
      # Policies:
      # 1. Permission to Invoke the BridgeLambda
      # 2. Permission to connect to the Database
      Policies:
        - Statement:
            Effect: Allow
            Action: 'lambda:InvokeFunction'
            # Targeted strictly at BridgeLambda in the same account/region
            Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:BridgeLambda"
        - Statement:
            Effect: Allow
            Action: 'rds:Connect'
            Resource: '*'

      # Environment Variables (Reusing the parameters you defined at the top)
      Environment:
        Variables:
          DB_HOST: !Ref PostgresHost
          DB_PORT: !Ref PostgresPort
          DB_NAME: !Ref PostgresDatabase
          DB_USER: !Ref PostgresUser
          DB_PASSWORD: !Ref PostgresPassword

  # --- 4. Bridge Lambda (Receives Batch Event from ML Processor) ---
  BridgeLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: BridgeLambda  # CRITICAL: Naming it explicitly so the ARN reference works
      CodeUri: BridgeLambda/
      Handler: app.handler        # Assumes you export 'const handler = ...' in app.mjs
      
      # Policies:
      # 1. Permission to connect to the Database
      # 2. Permission to RUN ECS TASKS and PASS ROLES (Critical for Fargate)
      Policies:
        - Statement:
            Effect: Allow
            Action: 'rds:Connect'
            Resource: '*'
        - Statement:
            Effect: Allow
            Action: 'ecs:RunTask'
            Resource: '*' # Allows running any task (you can restrict this to the specific ARN if you want strict security)
        - Statement:
            Effect: Allow
            Action: 'iam:PassRole'
            Resource: '*' # Required so Lambda can give the ECS Task permission to run

      # Environment Variables (Standardizing DB access + ECS Config)
      Environment:
        Variables:
          DB_HOST: !Ref PostgresHost
          DB_PORT: !Ref PostgresPort
          DB_NAME: !Ref PostgresDatabase
          DB_USER: !Ref PostgresUser
          DB_PASSWORD: !Ref PostgresPassword
          # --- ECS CONFIGURATION ---
          ECS_CLUSTER_NAME: "logstream-ecs-cluster"
          ECS_TASK_DEF_ARN: "logstream-task-def" # Uses 'latest' active revision automatically
          ECS_SUBNET_IDS: "subnet-09ac7289a9fd7299c,subnet-0f9696405ae6c0502"
          ECS_CONTAINER_NAME: "logstream-processing-container"
          # CRITICAL: Fargate REQUIRES a Security Group. 
          ECS_SEC_GROUP_IDS: "sg-05250be6d9b7e2618"